---
version: 2
updates:
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: cron
      cronjob: 30 6 * * *
      timezone: Europe/London
    cooldown:
      default-days: 7
      exclude:
        - libbeebimage
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: 30 6 * * *
      timezone: Europe/London
    cooldown:
      default-days: 7
    labels:
      - dependencies
